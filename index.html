<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>八字排盘</title>

    <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
    <!--
    ============================================================
    关键修复：为主CDN添加 onerror 回退，自动切换至备用CDN (jsdelivr)
    同时添加 crossorigin 属性以避免跨域脚本错误被静默忽略
    ============================================================
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.6.12/lunar.js"
    crossorigin="anonymous"
    onerror="
    console.warn('主CDN加载失败，尝试备用CDN...');
    var fallback=document.createElement('script');
    fallback.src='https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.js';
    fallback.crossOrigin='anonymous';
    fallback.onerror=function(){
    console.error('备用CDN也加载失败，请检查网络或关闭广告拦截器');
    window.__LUNAR_LOAD_FAILED__=true;
    };
    document.head.appendChild(fallback);
    "></script>

    <style>
        :root {
            --md-sys-color-primary: #385ba9;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d8e2ff;
            --md-sys-color-on-primary-container: #001a43;
            --md-sys-color-surface: #fdfcff;
            --md-sys-color-surface-container-low: #f3f3fa;
            --md-sys-color-surface-container: #eeeeec;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-on-surface-variant: #44474f;
            --md-sys-color-outline: #74777f;
            --md-sys-color-outline-variant: #c4c6d0;
            --md-sys-color-background: #f8f9ff;

            --md-sys-typescale-font: "Google Sans", "Product Sans", "Roboto", -apple-system, BlinkMacSystemFont, sans-serif;

            /* 五行核心色彩 */
            --wuxing-mu: #2e7d32;
            --wuxing-huo: #c62828;
            --wuxing-tu: #ef6c00;
            --wuxing-jin: #6d4c41;
            --wuxing-shui: #1565c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            font-family: var(--md-sys-typescale-font);
            line-height: 1.4;
            padding: 1rem 0.75rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            transition: max-width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header {
            text-align: center;
            margin-bottom: 1.25rem;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--md-sys-color-primary);
            letter-spacing: -0.05rem;
        }
        .header .subtitle {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
            margin-top: 0.25rem;
        }

        .card {
            background-color: var(--md-sys-color-surface);
            border-radius: 1.25rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .col-4 {
            grid-column: span 4;
        }
        .col-2 {
            grid-column: span 2;
        }
        .col-1 {
            grid-column: span 1;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-surface);
            position: absolute;
            top: -0.5rem;
            left: 0.6rem;
            padding: 0 0.25rem;
            z-index: 1;
        }

        input,
        select {
            width: 100%;
            height: 2.75rem;
            padding: 0 0.6rem;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 0.75rem;
            background: transparent;
            color: var(--md-sys-color-on-surface);
            font-size: 0.9rem;
            outline: none;
        }
        input:focus,
        select:focus {
            border-color: var(--md-sys-color-primary);
            border-width: 2px;
        }

        .button-row {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
            width: 100%;
        }
        button {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            border-radius: 100px;
            padding: 0.75rem 2rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .bazi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            background: var(--md-sys-color-surface-container-low);
            padding: 0.5rem;
            border-radius: 1rem;
            margin: 0.75rem 0;
        }
        .bazi-pillar {
            background: var(--md-sys-color-surface);
            border-radius: 0.75rem;
            padding: 0.6rem 0.2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .pillar-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--md-sys-color-on-surface-variant);
        }
        .gan-zhi-block {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .wx-mu {
            color: var(--wuxing-mu) !important;
        }
        .wx-huo {
            color: var(--wuxing-huo) !important;
        }
        .wx-tu {
            color: var(--wuxing-tu) !important;
        }
        .wx-jin {
            color: var(--wuxing-jin) !important;
        }
        .wx-shui {
            color: var(--wuxing-shui) !important;
        }

        .shi-shen {
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 0.1rem 0.35rem;
            border-radius: 0.4rem;
            width: max-content;
            margin: 0 auto;
        }
        .hide-gan {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            line-height: 1.3;
        }
        .yun-tag {
            font-size: 0.7rem;
            color: var(--md-sys-color-outline);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 1rem 0 0.5rem 0;
            color: var(--md-sys-color-on-surface);
        }

        .dayun-item {
            background: var(--md-sys-color-surface-container-low);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
            border: 1px solid transparent;
        }
        .dayun-item.active {
            border-color: var(--md-sys-color-outline-variant);
            background: var(--md-sys-color-surface);
        }
        .dayun-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            cursor: pointer;
            user-select: none;
        }
        .dayun-ganzhi {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .dayun-info {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
        }

        .liunian-wrapper {
            display: none;
            padding: 0 0.75rem 0.75rem 0.75rem;
            background: var(--md-sys-color-surface-container-low);
        }
        .dayun-item.active .liunian-wrapper {
            display: block;
        }

        .liunian-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .liunian-tag {
            text-align: center;
            background: var(--md-sys-color-surface);
            border-radius: 0.5rem;
            padding: 0.4rem 0.1rem;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.02);
        }
        .shishen-text {
            color: var(--md-sys-color-on-surface-variant) !important;
            font-size: 0.7rem;
            font-weight: normal;
        }

        .solar-time-panel {
            margin-top: 0.5rem;
            background: var(--md-sys-color-surface-container-low);
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .solar-time-panel strong {
            color: var(--md-sys-color-primary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #313033;
            color: #f4eff4;
            padding: 0.6rem 1.25rem;
            border-radius: 100px;
            font-size: 0.85rem;
            z-index: 1000;
            transition: transform 0.2s ease;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .app-footer {
            margin-top: 2rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--md-sys-color-on-surface-variant);
        }
        .app-footer a {
            color: var(--md-sys-color-primary);
            text-decoration: none;
            font-weight: 500;
        }
        .app-footer a:hover {
            text-decoration: underline;
        }

        /*
        ============================================================
        PC端/现代大屏响应式升级布局 (保持移动端原有体验完全不被侵蚀)
        增加 -webkit-sticky 兼容 Safari 桌面版
        ============================================================
        */
        @media (min-width: 768px) {
            body {
                padding: 2rem 1.5rem;
            }
            .container.has-result {
                max-width: 1150px;
            }
            .main-layout {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                width: 100%;
            }
            .container.has-result .main-layout {
                flex-direction: row;
                align-items: start;
                gap: 1.5rem;
            }
            .container.has-result .layout-left {
                width: 380px;
                flex-shrink: 0;
                position: -webkit-sticky;
                position: sticky;
                top: 1.5rem;
            }
            .container.has-result .layout-right {
                flex: 1;
                min-width: 0;
            }
            .container.has-result .liunian-list {
                grid-template-columns: repeat(10, 1fr);
                gap: 0.5rem;
            }
        }
        @media (max-width: 335px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .col-4,
            .col-2,
            .col-1 {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <div class="header">
            <h1>AI八字排盘</h1>
            <div class="subtitle" style="display: flex; justify-content: center; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                <span>AI 智能命理辅助工具</span>
                <span style="color: var(--md-sys-color-outline-variant);">|</span>
                <a href="https://github.com/XiaochangXu/Bazi-prompt-generator" target="_blank" style="color: var(--md-sys-color-primary); text-decoration: none; display: inline-flex; align-items: center; font-weight: 500; gap: 0.2rem;">
                    <svg height="14" width="14" viewBox="0 0 16 16" style="fill: currentColor; vertical-align: middle;"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82A7.427 7.427 0 0 0 8 4.49c-.68.01-1.36.09-2 .24-1.52-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
                    GitHub 项目
                </a>
            </div>
        </div>

        <div class="main-layout">
            <div class="layout-left">
                <div class="card" style="padding: 1rem;">
                    <form id="baziForm">
                        <div class="form-grid">
                            <div class="form-group col-2">
                                <label for="nameInput">姓名</label>
                                <input type="text" id="nameInput" placeholder="请输入姓名" required>
                            </div>
                            <div class="form-group col-2">
                                <label for="genderSelect">性别</label>
                                <select id="genderSelect">
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                            <div class="form-group col-2">
                                <label for="yearInput">公历出生年</label>
                                <input type="number" id="yearInput" placeholder="如：2007" min="1900" max="2100" required>
                            </div>
                            <div class="form-group col-1">
                                <label for="monthInput">月</label>
                                <input type="number" id="monthInput" placeholder="月" min="1" max="12" required>
                            </div>
                            <div class="form-group col-1">
                                <label for="dayInput">日</label>
                                <input type="number" id="dayInput" placeholder="日" min="1" max="31" required>
                            </div>
                            <div class="form-group col-4">
                                <label for="timeInput">公历生辰 (时:分)</label>
                                <input type="time" id="timeInput" required>
                            </div>
                            <div class="form-group col-4">
                                <label for="lngInput">出生地 (校正真太阳时)</label>
                                <select id="lngInput">
                                    <option value="120.00">基准北京时间 (东经 120.00°)</option>
                                    <option value="116.40">北京 直辖市 (东经 116.40°)</option>
                                    <option value="121.47">上海 直辖市 (东经 121.47°)</option>
                                    <option value="117.20">天津 直辖市 (东经 117.20°)</option>
                                    <option value="106.55">重庆 直辖市 (东经 106.55°)</option>
                                    <option value="114.17">香港 特别行政区 (东经 114.17°)</option>
                                    <option value="113.54">澳门 特别行政区 (东经 113.54°)</option>
                                    <option value="113.30">广东 广州/韶关 (东经 113.30°)</option>
                                    <option value="114.31">湖北 武汉 (东经 114.31°)</option>
                                    <option value="112.98">湖南 长沙 (东经 112.98°)</option>
                                    <option value="118.78">江苏 南京 (东经 118.78°)</option>
                                    <option value="120.19">浙江 杭州 (东经 120.19°)</option>
                                    <option value="117.27">安徽 合肥 (东经 117.27°)</option>
                                    <option value="119.30">福建 福州 (东经 119.30°)</option>
                                    <option value="115.89">江西 南昌 (东经 115.89°)</option>
                                    <option value="117.00">山东 济南 (东经 117.00°)</option>
                                    <option value="113.65">河南 郑州 (东经 113.65°)</option>
                                    <option value="114.48">河北 石家庄 (东经 114.48°)</option>
                                    <option value="112.53">山西 太原 (东经 112.53°)</option>
                                    <option value="104.06">四川 成都 (东经 104.06°)</option>
                                    <option value="108.93">陕西 西安 (东经 108.93°)</option>
                                </select>
                            </div>
                        </div>
                        <div id="solarTimePanel" class="solar-time-panel" style="display: none;"></div>
                        <div class="button-row">
                            <button type="submit">生成排盘</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="layout-right">
                <div id="resultContainer" style="display: none;">
                    <div class="card" style="border-color: transparent; background: transparent; padding: 0; margin-bottom: 0.75rem;">
                        <button id="copyAiPromptBtn" class="secondary">📋 一键复制 AI 深度分析提示词</button>
                    </div>
                    <div class="card">
                        <div class="section-title" style="margin-top: 0;">四柱排盘</div>
                        <div id="baziGridContainer" class="bazi-grid"></div>
                    </div>

                    <div id="analysisCardContainer"></div>

                    <div class="card">
                        <div id="dayunContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <p>开源项目：<a href="https://github.com/XiaochangXu/Bazi-prompt-generator" target="_blank">Bazi-prompt-generator</a></p>
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        (function() {
            let currentBaziData = null;

            /*
            ============================================================
            关键修复：添加库就绪检测函数
            检测 lunar-javascript 库是否成功加载（检查全局 Solar / Lunar 对象）
            ============================================================
            */
            function isLunarLibraryReady() {
                // 检查核心全局对象是否存在
                return typeof window.Solar !== 'undefined' && typeof window.Lunar !== 'undefined';
            }

            // 如果 CDN 的 onerror 设置了失败标记，也予以识别
            function isLibraryFailed() {
                return window.__LUNAR_LOAD_FAILED__ === true;
            }

            // 核心基础映射数据定义
            const WUXING_MAP = {
                '甲': 'mu',
                '乙': 'mu',
                '寅': 'mu',
                '卯': 'mu',
                '丙': 'huo',
                '丁': 'huo',
                '巳': 'huo',
                '午': 'huo',
                '戊': 'tu',
                '己': 'tu',
                '辰': 'tu',
                '戌': 'tu',
                '丑': 'tu',
                '未': 'tu',
                '庚': 'jin',
                '辛': 'jin',
                '申': 'jin',
                '酉': 'jin',
                '壬': 'shui',
                '癸': 'shui',
                '亥': 'shui',
                '子': 'shui'
            };

            const GAN_WUXING = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金',
                '辛': '金', '壬': '水', '癸': '水' };
            const GAN_YINYANG = { '甲': '阳', '丙': '阳', '戊': '阳', '庚': '阳', '壬': '阳', '乙': '阴', '丁': '阴', '己': '阴',
                '辛': '阴', '癸': '阴' };

            // 工具方法：安全控制及输入过滤转义
            function sanitizeInput(str) {
                return str.replace(/[<>&"'\/]/g, function(s) {
                    return { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#x27;',
                        '/': '&#x2F;' } [s];
                });
            }

            function isValidDate(y, m, d) {
                if (isNaN(y) || isNaN(m) || isNaN(d)) return false;
                const dt = new Date(y, m - 1, d);
                return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
            }

            function showToast(msg, duration = 3000) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                // 清除之前的定时器
                if (toast._timeout) clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
            }

            function wrapWxColor(char) {
                if (!char) return '';
                const cls = WUXING_MAP[char];
                return cls ? `<span class="wx-${cls}">${char}</span>` : char;
            }

            function getEquationOfTime(year, month, day) {
                const N = Math.floor(275 * month / 9) - (Math.floor((month + 9) / 12) * (1 + Math.floor((year - 4 * Math
                    .floor(year / 4) + 2) / 3))) + day - 30;
                const B = (360 / 365.24) * (N - 81) * Math.PI / 180;
                return 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
            }

            function getShiShen(dayGan, targetGan) {
                if (!dayGan || !targetGan) return '';
                const wuXingDay = GAN_WUXING[dayGan];
                const wuXingTarget = GAN_WUXING[targetGan];
                const dayYinYang = GAN_YINYANG[dayGan] === '阳';
                const targetYinYang = GAN_YINYANG[targetGan] === '阳';
                if (wuXingDay === wuXingTarget) return dayYinYang === targetYinYang ? '比肩' : '劫财';
                const shengKeMap = {
                    '木火': '我生',
                    '火土': '我生',
                    '土金': '我生',
                    '金水': '我生',
                    '水木': '我生',
                    '木土': '我克',
                    '土水': '我克',
                    '水火': '我克',
                    '火金': '我克',
                    '金木': '我克',
                    '木金': '克我',
                    '金火': '克我',
                    '火水': '克我',
                    '水土': '克我',
                    '土木': '克我',
                    '木水': '生我',
                    '水金': '生我',
                    '金土': '生我',
                    '土火': '生我',
                    '火木': '生我'
                };
                const relation = shengKeMap[wuXingDay + wuXingTarget];
                switch (relation) {
                    case '我生':
                        return dayYinYang === targetYinYang ? '食神' : '伤官';
                    case '我克':
                        return dayYinYang === targetYinYang ? '偏财' : '正财';
                    case '克我':
                        return dayYinYang === targetYinYang ? '七杀' : '正官';
                    case '生我':
                        return dayYinYang === targetYinYang ? '偏印' : '正印';
                    default:
                        return '';
                }
            }

            function getChangSheng(dayGan, diZhi) {
                const changShengNames = ['长生', '沐浴', '冠带', '临官', '帝旺', '衰', '病', '死', '墓', '绝', '胎', '养'];
                const startZhiMap = { '甲': '亥', '乙': '午', '丙': '寅', '丁': '酉', '戊': '寅', '己': '酉', '庚': '巳',
                    '辛': '子', '壬': '申', '癸': '卯' };
                const diZhiOrder = ['寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥', '子', '丑'];
                const startZhi = startZhiMap[dayGan];
                if (!startZhi) return '';
                const startIndex = diZhiOrder.indexOf(startZhi);
                const targetIndex = diZhiOrder.indexOf(diZhi);
                if (startIndex === -1 || targetIndex === -1) return '';
                const isYang = GAN_YINYANG[dayGan] === '阳';
                return changShengNames[isYang ? (targetIndex - startIndex + 12) % 12 : (startIndex - targetIndex + 12) %
                    12];
            }

            function generateBaziData(name, gender, year, month, day, hour, minute, longitude) {
                /*
                ============================================================
                修复库引用逻辑：统一使用 window 上的全局对象
                lunar-javascript 库加载后会在 window 上暴露 Solar、Lunar 等
                ============================================================
                */
                if (!isLunarLibraryReady()) {
                    throw new Error(
                        "命理核心库未加载成功，请检查网络连接或暂时关闭广告拦截插件后刷新页面重试。若持续失败，请尝试使用手机热点。");
                }

                // 直接使用全局对象，避免复杂的回退逻辑
                const Solar = window.Solar;
                const Lunar = window.Lunar;

                const longitudeOffsetMin = (longitude - 120.0) * 4;
                const eotMin = getEquationOfTime(year, month, day);
                const totalOffsetMin = longitudeOffsetMin + eotMin;

                let baseDate = new Date(year, month - 1, day, hour, minute);
                baseDate.setMilliseconds(baseDate.getMilliseconds() + totalOffsetMin * 60 * 1000);

                const solar = Solar.fromYmdHms(baseDate.getFullYear(), baseDate.getMonth() + 1, baseDate.getDate(),
                    baseDate.getHours(), baseDate.getMinutes(), 0);
                const lunar = solar.getLunar();
                const eightChar = lunar.getEightChar();
                const dayGan = eightChar.getDayGan();
                const monthPillarText = eightChar.getMonth();
                const monthShiShen = getShiShen(dayGan, monthPillarText.charAt(0));

                function buildPillar(ganZhi, gan, zhi, hideGanArr, hasTianGanShiShen) {
                    return {
                        ganZhi,
                        gan,
                        zhi,
                        hideGan: hideGanArr.map(hg => ({ gan: hg, shiShen: getShiShen(dayGan, hg) })),
                        changSheng: getChangSheng(dayGan, zhi),
                        shiShen: hasTianGanShiShen ? getShiShen(dayGan, gan) : ''
                    };
                }

                const yun = eightChar.getYun(gender === '男' ? 1 : 0);

                // 提取精确起运时间
                const exactYunText =
                    `${yun.getStartYear()}岁${yun.getStartMonth()}个月${yun.getStartDay()}天起运`;

                const rawDaYun = yun.getDaYun();
                const filteredDaYun = [];

                let realStartAge = 8,
                    realStartYear = year + 8;
                for (let i = 0; i < rawDaYun.length; i++) {
                    if (rawDaYun[i].getGanZhi()) {
                        realStartYear = rawDaYun[i].getStartYear();
                        realStartAge = rawDaYun[i].getStartAge();
                        break;
                    }
                }

                filteredDaYun.push({
                    isTaiYun: true,
                    ganZhi: '',
                    title: `胎运 (走月柱${monthPillarText}之气)`,
                    ageText: `0~${realStartAge}岁`,
                    yearText: `${year}-${realStartYear}`,
                    shiShen: monthShiShen,
                    liuNian: []
                });

                const currentRealYear = new Date().getFullYear();
                rawDaYun.forEach((dYun) => {
                    const gz = dYun.getGanZhi();
                    if (!gz) return;

                    const currentStartAge = dYun.getStartAge();
                    const currentEndAge = dYun.getEndAge();
                    const currentStartYear = dYun.getStartYear();

                    const isCurrent運 = (currentRealYear >= currentStartYear && currentRealYear <
                        currentStartYear + 10);

                    filteredDaYun.push({
                        isTaiYun: false,
                        ganZhi: gz,
                        gan: gz.charAt(0),
                        zhi: gz.charAt(1),
                        isCurrent: isCurrent運,
                        ageText: `${currentStartAge}-${currentEndAge}岁`,
                        yearText: `${currentStartYear}-${currentStartYear + 10}`,
                        shiShen: getShiShen(dayGan, gz.charAt(0)),
                        liuNian: dYun.getLiuNian().map(ln => ({
                            year: ln.getYear(),
                            ganZhi: ln.getGanZhi(),
                            shiShen: getShiShen(dayGan, ln.getGanZhi().charAt(0))
                        }))
                    });
                });

                // ======================= 新增分析模块计算逻辑 =======================

                const wuxingPoints = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
                const dmMuxing = GAN_WUXING[dayGan];

                const zhiHideMap = {
                    '子': ['癸'],
                    '丑': ['己', '癸', '辛'],
                    '寅': ['甲', '丙', '戊'],
                    '卯': ['乙'],
                    '辰': ['戊', '乙', '癸'],
                    '巳': ['丙', '庚', '戊'],
                    '午': ['丁', '己'],
                    '未': ['己', '丁', '乙'],
                    '申': ['庚', '壬', '戊'],
                    '酉': ['辛'],
                    '戌': ['戊', '辛', '丁'],
                    '亥': ['壬', '甲']
                };
                const zhiPowerMap = [15, 10, 5];

                const yueLingZhi = eightChar.getMonthZhi();
                const allZhi = [eightChar.getYearZhi(), yueLingZhi, eightChar.getDayZhi(), eightChar.getTimeZhi()];
                const allGan = [eightChar.getYearGan(), eightChar.getMonthGan(), eightChar.getDayGan(), eightChar
                    .getTimeGan()
                ];

                // 1. 月令本气占40%
                const ylMainGan = zhiHideMap[yueLingZhi][0];
                wuxingPoints[GAN_WUXING[ylMainGan]] += 40;

                // 2. 其它地支藏干力量归属
                allZhi.forEach((zhi, idx) => {
                    const hgs = zhiHideMap[zhi];
                    hgs.forEach((g, gIdx) => {
                        if (idx === 1 && gIdx === 0) return;
                        wuxingPoints[GAN_WUXING[g]] += (zhiPowerMap[gIdx] || 0);
                    });
                });

                // 3. 天干五行力量加成 (每个5%)
                allGan.forEach(g => {
                    wuxingPoints[GAN_WUXING[g]] += 5;
                });

                // 力量归一化至100%
                let totalWx = 0;
                for (let k in wuxingPoints) totalWx += wuxingPoints[k];
                const wxPercent = {};
                for (let k in wuxingPoints) wxPercent[k] = totalWx === 0 ? 0 : Math.round((wuxingPoints[k] /
                    totalWx) * 100);

                // 十神数量统计
                const ssCount = {};
                const allGanAndHide = [...allGan];
                allZhi.forEach(z => zhiHideMap[z].forEach(g => allGanAndHide.push(g)));
                allGanAndHide.forEach(g => {
                    const ss = getShiShen(dayGan, g);
                    if (ss) ssCount[ss] = (ssCount[ss] || 0) + 1;
                });
                const dmSs = getShiShen(dayGan, dayGan);
                if (ssCount[dmSs] > 0) ssCount[dmSs]--;

                // 纳音及空亡
                const naYin = [eightChar.getYearNaYin(), eightChar.getMonthNaYin(), eightChar.getDayNaYin(),
                    eightChar.getTimeNaYin()
                ];
                const kwYear = eightChar.getYearXunKong();
                const kwDay = eightChar.getDayXunKong();

                // 命理结构计算
                const taiYuan = eightChar.getTaiYuan();
                const mingGong = eightChar.getMingGong();
                const shenGong = eightChar.getShenGong();

                const shenShaList = [];
                const tianYiMap = { '甲': ['丑', '未'], '乙': ['子', '申'], '丙': ['亥', '酉'], '丁': ['亥', '酉'],
                    '戊': ['丑', '未'], '己': ['子', '申'], '庚': ['丑', '未'], '辛': ['午', '寅'], '壬': ['卯',
                        '巳'
                    ], '癸': ['卯', '巳'] };
                const wenChangMap = { '甲': ['巳'], '乙': ['午'], '丙': ['申'], '丁': ['酉'], '戊': ['申'], '己': ['酉'],
                    '庚': ['亥'], '辛': ['子'], '壬': ['寅'], '癸': ['卯'] };
                const sanHeMap = {
                    '申': ['酉', '寅', '辰', '子'],
                    '子': ['酉', '寅', '辰', '子'],
                    '辰': ['酉', '寅', '辰', '子'],
                    '亥': ['子', '巳', '未', '卯'],
                    '卯': ['子', '巳', '未', '卯'],
                    '未': ['子', '巳', '未', '卯'],
                    '寅': ['卯', '申', '戌', '午'],
                    '午': ['卯', '申', '戌', '午'],
                    '戌': ['卯', '申', '戌', '午'],
                    '巳': ['午', '亥', '丑', '酉'],
                    '酉': ['午', '亥', '丑', '酉'],
                    '丑': ['午', '亥', '丑', '酉']
                };
                const riZhi = eightChar.getDayZhi();

                tianYiMap[dayGan].forEach(z => { if (allZhi.includes(z)) shenShaList.push(`天乙贵人(${z})`); });
                wenChangMap[dayGan].forEach(z => { if (allZhi.includes(z)) shenShaList.push(`文昌贵人(${z})`); });
                const checkBranchSha = (baseZhi) => {
                    const arr = sanHeMap[baseZhi];
                    if (arr) {
                        if (allZhi.includes(arr[0])) shenShaList.push(`桃花(${arr[0]})`);
                        if (allZhi.includes(arr[1])) shenShaList.push(`驿马(${arr[1]})`);
                        if (allZhi.includes(arr[2])) shenShaList.push(`华盖(${arr[2]})`);
                        if (allZhi.includes(arr[3])) shenShaList.push(`将星(${arr[3]})`);
                    }
                };
                checkBranchSha(riZhi);
                checkBranchSha(eightChar.getYearZhi());
                const uniqueShenSha = [...new Set(shenShaList)];

                // 自动分析计算 (旺度、格局、喜用)
                let shengFuScore = 0;
                let keXieHaoScore = 0;
                const isShengFu = (wx) => {
                    if (wx === dmMuxing) return true;
                    const shengMap = { '木': '水', '火': '木', '土': '火', '金': '土', '水': '金' };
                    return shengMap[dmMuxing] === wx;
                };

                if (isShengFu(GAN_WUXING[ylMainGan])) shengFuScore += 40;
                else keXieHaoScore += 3;

                allZhi.forEach((zhi, zhiIdx) => {
                    const hgs = zhiHideMap[zhi];
                    hgs.forEach((g, gIdx) => {
                        if (zhiIdx === 1 && gIdx === 0) return;
                        if (isShengFu(GAN_WUXING[g])) shengFuScore += (zhiPowerMap[gIdx] || 0);
                        else keXieHaoScore += 3;
                    });
                });

                allGan.forEach((g, gIdx) => {
                    if (gIdx === 2) return;
                    if (isShengFu(GAN_WUXING[g])) shengFuScore += 5;
                    else keXieHaoScore += 5;
                });

                const wangDu = 100 + shengFuScore - keXieHaoScore;

                let wangDuLevel = "中和";
                let isCong = false;
                let isCongQiang = false;

                if (wangDu < 20 && shengFuScore === 0) { wangDuLevel = "从弱格";
                    isCong = true; } else if (wangDu < 80) { wangDuLevel = "身弱"; } else if (wangDu <= 120) { wangDuLevel =
                        "中和"; } else if (wangDu <= 180) { wangDuLevel = "身强"; } else if (keXieHaoScore === 0) { wangDuLevel =
                        "从强格";
                    isCong = true;
                    isCongQiang = true; } else { wangDuLevel = "身极强(不从)"; }

                const yueLingSs = getShiShen(dayGan, ylMainGan);

                const riGanChangShengInYue = getChangSheng(dayGan, yueLingZhi);
                let geJu = yueLingSs + "格";
                if (riGanChangShengInYue === '帝旺') {
                    geJu = "羊刃格";
                } else if (riGanChangShengInYue === '临官') {
                    geJu = "建禄格";
                }

                if (isCong) geJu = wangDuLevel + " (" + geJu + "为变格)";

                const shengMap = { '木': '水', '火': '木', '土': '火', '金': '土', '水': '金' };
                const keMap = { '木': '金', '火': '水', '土': '木', '金': '火', '水': '土' };
                const xieMap = { '木': '火', '火': '土', '土': '金', '金': '水', '水': '木' };
                const haoMap = { '木': '土', '火': '金', '土': '水', '金': '木', '水': '火' };
                const biMap = dmMuxing;
                const yinMap = shengMap[dmMuxing];

                const renderColoredWx = (wx) => `<span class="wx-${WUXING_MAP[wx]}">${wx}</span>`;
                const shengFuStr =
                    `${renderColoredWx(yinMap)}(印) / ${renderColoredWx(biMap)}(比)`;
                const keXieHaoStr =
                    `${renderColoredWx(keMap[dmMuxing])}(杀) / ${renderColoredWx(haoMap[dmMuxing])}(财) / ${renderColoredWx(xieMap[dmMuxing])}(伤)`;

                let xiYong = "",
                    jiShen = "";
                if (wangDuLevel === "身强" || wangDuLevel === "身极强(不从)") {
                    xiYong = "克泄耗 " + keXieHaoStr;
                    jiShen = "生扶 " + shengFuStr;
                } else if (wangDuLevel === "身弱") {
                    xiYong = "生扶 " + shengFuStr;
                    jiShen = "克泄耗 " + keXieHaoStr;
                } else if (wangDuLevel === "中和") {
                    xiYong = "需结合大运流年综合判断";
                    jiShen = "偏枯五行";
                } else if (isCongQiang) {
                    xiYong = "生扶 " + shengFuStr;
                    jiShen = "克泄耗 " + keXieHaoStr;
                } else {
                    xiYong = "所从五行 (视特殊变格而定)";
                    jiShen = "生扶日元 " + shengFuStr;
                }

                let tiaoHou = "";
                if (['亥', '子', '丑'].includes(yueLingZhi)) tiaoHou =
                    `生于冬月，急需调候用 <strong class="wx-huo">火</strong>`;
                if (['巳', '午', '未'].includes(yueLingZhi)) tiaoHou =
                    `生于夏月，急需调候用 <strong class="wx-shui">水</strong>`;

                return {
                    name,
                    gender,
                    birthday: `${baseDate.getFullYear()}-${String(baseDate.getMonth()+1).padStart(2,'0')}-${String(baseDate.getDate()).padStart(2,'0')} ${String(baseDate.getHours()).padStart(2,'0')}:${String(baseDate.getMinutes()).padStart(2,'0')}`,
                    exactYunText,
                    yearPillar: buildPillar(eightChar.getYear(), eightChar.getYearGan(), eightChar.getYearZhi(),
                        eightChar.getYearHideGan(), true),
                    monthPillar: buildPillar(eightChar.getMonth(), eightChar.getMonthGan(), eightChar.getMonthZhi(),
                        eightChar.getMonthHideGan(), true),
                    dayPillar: buildPillar(eightChar.getDay(), eightChar.getDayGan(), eightChar.getDayZhi(), eightChar
                        .getDayHideGan(), false),
                    timePillar: buildPillar(eightChar.getTime(), eightChar.getTimeGan(), eightChar.getTimeZhi(),
                        eightChar.getTimeHideGan(), true),
                    daYun: filteredDaYun,
                    stats: { wxPercent, ssCount, naYin, kwYear, kwDay },
                    structure: { taiYuan, mingGong, shenGong, shenSha: uniqueShenSha },
                    analysis: { wangDu, wangDuLevel, geJu, xiYong, jiShen, tiaoHou }
                };
            }

                const wxBars = ['木', '火', '土', '金', '水'].map(wx => {

                            <div style="font-size:0.8rem; grid-column:span 2;"><span style="color:var(--md-sys-color-primary); font-weight:700;">十神数量：</span>${ssText}</div>
                            <div style="font-size:0.8rem; grid-column:span 2;"><span style="color:var(--md-sys-color-primary); font-weight:700;">四柱纳音：</span>${data.stats.naYin.join(' / ')}</div>
                            <div style="font-size:0.8rem; grid-column:span 2;"><span style="color:var(--md-sys-color-primary); font-weight:700;">空亡地支：</span>年空(${data.stats.kwYear})，日空(${data.stats.kwDay})</div>
                        </div>

                        <div class="section-title" style="margin-top: 1.5rem;">命理结构</div>
                        <div class="bazi-grid" style="grid-template-columns: repeat(3, 1fr); margin:0.5rem 0;">
                            <div class="bazi-pillar">
                                <div class="pillar-title">胎元</div>
                                <div class="gan-zhi-block">${wrapWxColor(data.structure.taiYuan.charAt(0))}<br>${wrapWxColor(data.structure.taiYuan.charAt(1))}</div>
                                <div class="shi-shen" style="margin-top:0.25rem;">${getShiShen(data.dayPillar.gan, data.structure.taiYuan.charAt(0)) || '日主'}</div>
                            </div>
                            <div class="bazi-pillar">
                                <div class="pillar-title">命宫</div>
                                <div class="gan-zhi-block">${wrapWxColor(data.structure.mingGong.charAt(0))}<br>${wrapWxColor(data.structure.mingGong.charAt(1))}</div>
                                <div class="shi-shen" style="margin-top:0.25rem;">${getShiShen(data.dayPillar.gan, data.structure.mingGong.charAt(0)) || '日主'}</div>
                            </div>
                            <div class="bazi-pillar">
                                <div class="pillar-title">身宫</div>
                                <div class="gan-zhi-block">${wrapWxColor(data.structure.shenGong.charAt(0))}<br>${wrapWxColor(data.structure.shenGong.charAt(1))}</div>
                                <div class="shi-shen" style="margin-top:0.25rem;">${getShiShen(data.dayPillar.gan, data.structure.shenGong.charAt(0)) || '日主'}</div>

                        </div>

                `;
