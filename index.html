        .timeline-wrap {
            position: relative;
            padding: 0.5rem 0;
            overflow-x: auto;
            display: flex;
            gap: 0.3rem;
            align-items: flex-end;
            min-height: 150px;
        }
        .timeline-bar {
            flex-shrink: 0;
            width: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            transition: all var(--transition);
        }
        .timeline-bar:hover { transform: translateY(-4px); }
        .timeline-bar-fill {
            width: 100%;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition-slow);
            min-height: 4px;
        }
        .timeline-bar-label {
            font-size: 0.6rem;
            color: var(--muted);
            text-align: center;
            font-weight: 600;
            writing-mode: vertical-rl;
        }
        .timeline-bar.active .timeline-bar-fill {
            box-shadow: 0 0 12px var(--accent);
        }

        /* ================================================================
           TOAST
           ================================================================ */
        .toast-wrap {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            pointer-events: none;
        }
        .toast {
            background: #313033;
            color: #f4eff4;
            padding: 0.65rem 1.5rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            transform: translateY(120px);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #1b5e20; color: #fff; }
        .toast.error { background: #b71c1c; color: #fff; }

        /* ================================================================
           HISTORY DRAWER
           ================================================================ */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed;
            top: 0;
            right: -380px;
            width: 360px;
            max-width: 90vw;
            height: 100%;
            height: 100dvh;
            background: var(--surface);
            z-index: 1510;
            overflow-y: auto;
            padding: 1.5rem;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }
        .drawer.open { right: 0; }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--rule);
        }
        .drawer-title { font-size: 1.1rem; font-weight: 700; }

        .hist-item {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hist-item:hover { border-color: var(--accent); }
        .hist-name { font-weight: 700; font-size: 0.9rem; }
        .hist-date { font-size: 0.75rem; color: var(--muted); }
        .hist-actions { display: flex; gap: 0.3rem; }

        /* ================================================================
           COMPARISON MODAL
           ================================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1600;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            width: 95%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            transform: scale(0.92);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.open .modal { transform: scale(1); }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* ================================================================
           AI PANEL
           ================================================================ */
        .ai-panel { display: none; }
        .ai-panel.visible { display: block; animation: fadeInUp 0.4s ease; }
        .ai-config {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .ai-config input, .ai-config select {
            height: 2.25rem;
            padding: 0 0.6rem;
            border: 1.5px solid var(--rule);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--ink);
            font-size: 0.8rem;
            font-family: inherit;
        }
        .ai-config input { flex: 1; }
        .ai-response {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.7;
            white-space: pre-wrap;
            margin-top: 0.75rem;
        }
        .ai-loading {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .ai-dot { width: 0.5rem; height: 0.5rem; background: var(--accent); border-radius: 50%; animation: pulse 1.2s ease infinite; }
        .ai-dot:nth-child(2) { animation-delay: 0.2s; }
        .ai-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        /* ================================================================
           SOLAR TIME PANEL & INFO ROWS
           ================================================================ */
        .solar-time-panel {
            margin-top: 0.5rem;
            background: var(--accent-bg2, var(--surface2));
            border-radius: var(--radius);
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }
        .solar-time-panel strong { color: var(--accent); }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            background: var(--surface2);
            padding: 0.75rem;
            border-radius: var(--radius);
            font-size: 0.78rem;
        }
        .info-grid .label { color: var(--accent); font-weight: 700; }

        /* ================================================================
           FOOTER
           ================================================================ */
        .app-footer {
            margin-top: 2rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
        }
        .app-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }

        /* ================================================================
           ANIMATIONS
           ================================================================ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        @keyframes countUp {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 4px var(--accent); }
            50% { box-shadow: 0 0 16px var(--accent); }
        }

        .anim-stagger > * { opacity: 0; animation: fadeInUp 0.5s ease forwards; }
        .anim-stagger > *:nth-child(1) { animation-delay: 0.05s; }
        .anim-stagger > *:nth-child(2) { animation-delay: 0.1s; }
        .anim-stagger > *:nth-child(3) { animation-delay: 0.15s; }
        .anim-stagger > *:nth-child(4) { animation-delay: 0.2s; }
        .anim-stagger > *:nth-child(5) { animation-delay: 0.25s; }
        .anim-stagger > *:nth-child(6) { animation-delay: 0.3s; }
        .anim-stagger > *:nth-child(7) { animation-delay: 0.35s; }
        .anim-stagger > *:nth-child(8) { animation-delay: 0.4s; }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 960px) {
            .app-wrap.has-result .main-layout { gap: 0.85rem; }
            .app-wrap.has-result .layout-left { width: 300px; }
            .app-wrap.has-result .liunian-list { grid-template-columns: repeat(6, 1fr); gap: 0.35rem; }
            .form-grid { gap: 0.45rem; }
        }
        @media (max-width: 768px) {
            .app-wrap.has-result .main-layout { flex-direction: column; }
            .app-wrap.has-result .layout-left { width: 100%; position: static; }
            .app-wrap.has-result .liunian-list { grid-template-columns: repeat(4, 1fr); gap: 0.25rem; }
            .compare-grid { grid-template-columns: 1fr; }
            .drawer { width: 300px; right: -320px; }

            /* 八字四柱：极限缩小，防止挤压重叠，禁止折行 */
            .bazi-grid { gap: 2px; padding: 2px; }
            .bazi-pillar {
                padding: 0.2rem 0.02rem;
                gap: 0.1rem;
                border-radius: 0.4rem;
                min-width: 0;
                overflow: hidden;
            }
            .pillar-title { font-size: 0.5rem; white-space: nowrap; }
            .gan-zhi-block {
                font-size: calc(0.72rem + 0.8vw);
                font-weight: 800;
                line-height: 1.1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .shi-shen-tag {
                font-size: 0.5rem;
                padding: 0.06rem 0.25rem;
                max-width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .hide-gan-line { font-size: 0.55rem; line-height: 1.2; }
            .yun-tag { font-size: 0.5rem; white-space: nowrap; }

            /* 卡片 */
            .card { padding: 0.65rem 0.7rem; margin-bottom: 0.5rem; }
            .sec-title { font-size: 0.78rem; margin: 0.35rem 0 0.15rem; }

            /* 神煞标签 */
            .rel-tag { font-size: 0.58rem; padding: 0.08rem 0.3rem; margin: 0.08rem; display: inline-block; }

            /* 五行进度条 */
            .wx-chart-row { gap: 0.3rem; }
            .wx-bar-track { height: 0.85rem; }
            .wx-label { width: 1.6rem; font-size: 0.65rem; padding: 0.15rem 0.2rem; }
            .wx-bar-fill::after { font-size: 0.55rem; right: 0.25rem; }
            .wx-pct { font-size: 0.65rem; min-width: 1.8rem; }

            /* 大运手风琴 */
            .dayun-header { padding: 0.45rem 0.6rem; }
            .dayun-ganzhi { font-size: 0.85rem; }
            .dayun-info { font-size: 0.65rem; }
            .liunian-wrapper { padding: 0 0.4rem; }
            .dayun-item.active .liunian-wrapper { padding-bottom: 0.4rem; max-height: 260px; }
            .liunian-tag { font-size: 0.58rem; padding: 0.2rem 0.02rem; }

            /* 大运时间线 */
            .timeline-wrap { gap: 0.15rem; min-height: 100px; padding: 0.3rem 0; }
            .timeline-bar { width: 1.3rem; }
            .timeline-bar-label { font-size: 0.48rem; }

            /* 按钮 */
            .btn { padding: 0.45rem 0.8rem; font-size: 0.75rem; }
            .btn-sm { padding: 0.28rem 0.55rem; font-size: 0.65rem; }

            /* 分析卡中副网格 */
            .info-grid { grid-template-columns: 1fr; gap: 0.3rem; padding: 0.5rem; font-size: 0.7rem; }
            .bazi-grid[style*="repeat(3,1fr)"] { grid-template-columns: repeat(3, 1fr) !important; gap: 2px; padding: 2px; }

            /* header */
            .header h1 { font-size: 1.2rem; }
            .header .sub { font-size: 0.65rem; }

            /* 表单 */
            .form-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
            .fg-4, .fg-2, .fg-1 { grid-column: span 2; }
            .field label { font-size: 0.6rem; top: -0.4rem; left: 0.5rem; }
            .field input, .field select { height: 2.5rem; font-size: 0.8rem; }

            /* AI面板 */
            .ai-config { flex-wrap: wrap; }
            .ai-config input { flex: 1 1 100%; }
            .ai-response { max-height: 250px; font-size: 0.78rem; }
        }
        @media (max-width: 360px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
            .fg-4, .fg-2, .fg-1 { grid-column: span 2; }
            .app-wrap.has-result .liunian-list { grid-template-columns: repeat(3, 1fr); }

            /* 四柱极窄模式 */
            .bazi-grid { gap: 1px; padding: 1px; }
            .bazi-pillar { padding: 0.15rem 0; gap: 0.08rem; border-radius: 0.3rem; }
            .pillar-title { font-size: 0.45rem; }
            .gan-zhi-block { font-size: calc(0.62rem + 0.6vw); }
            .shi-shen-tag { font-size: 0.45rem; padding: 0.04rem 0.18rem; }
            .hide-gan-line { font-size: 0.48rem; }
            .yun-tag { font-size: 0.45rem; }

            .card { padding: 0.5rem 0.55rem; }
            .field input, .field select { font-size: 0.72rem; height: 2.3rem; }
            .wx-label { width: 1.4rem; font-size: 0.6rem; }
            .wx-bar-track { height: 0.75rem; }
            .wx-bar-fill::after { font-size: 0.5rem; }
            .wx-pct { font-size: 0.6rem; min-width: 1.6rem; }
            .header h1 { font-size: 1.1rem; }
            .dayun-ganzhi { font-size: 0.78rem; }
        }

        /* Print Styles */
        @media print {
            body { background: #fff; color: #000; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
            .btn, .theme-btn, .drawer-overlay, .drawer, .modal-overlay, .toast-wrap,
            .header .sub a, .ai-panel, .app-footer, .back-to-top, .privacy-toggle-wrap { display: none !important; }
            .app-wrap.has-result .main-layout { flex-direction: column; }
            .app-wrap.has-result .layout-left { width: 100%; position: static; }
        }

        /* ================================================================
           BACK-TO-TOP BUTTON
           ================================================================ */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3rem;
            height: 3rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1400;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-to-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .back-to-top:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
        .back-to-top:active { transform: scale(0.92); }

        /* ================================================================
           PRIVACY TOGGLE
           ================================================================ */
        .privacy-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.5rem;
            justify-content: center;
        }
        .privacy-toggle {
            position: relative;
            width: 2.8rem;
            height: 1.5rem;
            background: var(--bg3);
            border-radius: 100px;
            cursor: pointer;
            transition: background 0.3s ease;
            border: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .privacy-toggle.active { background: var(--accent); border-color: var(--accent); }
        .privacy-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 1.1rem;
            height: 1.1rem;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-sm);
        }
        .privacy-toggle.active::after { transform: translateX(1.3rem); }

        /* ================================================================
           LUCKY INFO SECTION
           ================================================================ */
        .lucky-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .lucky-item {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 0.6rem;
            text-align: center;
            transition: all var(--transition);
        }
        .lucky-item .lucky-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .lucky-item .lucky-label { font-size: 0.65rem; color: var(--muted); font-weight: 600; }
        .lucky-item .lucky-value { font-size: 0.85rem; font-weight: 700; color: var(--ink); margin-top: 0.15rem; }

        /* ================================================================
           STREAMING TEXT ANIMATION
           ================================================================ */
        .ai-response.streaming::after {
            content: '▊';
            animation: blink 1s step-end infinite;
            color: var(--accent);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ================================================================
           CONFIRM DIALOG
           ================================================================ */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1700;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .confirm-overlay.open { opacity: 1; pointer-events: auto; }
        .confirm-dialog {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            transform: scale(0.9);
            transition: transform 0.25s ease;
        }
        .confirm-overlay.open .confirm-dialog { transform: scale(1); }
        .confirm-dialog p { margin: 0.75rem 0 1.25rem; color: var(--ink2); font-size: 0.9rem; }
        .confirm-actions { display: flex; gap: 0.5rem; justify-content: center; }

        /* ================================================================
           LIUNIAN DETAIL POPOVER
           ================================================================ */
        .liunian-detail-popover {
            position: fixed;
            z-index: 1550;
            background: var(--surface);
            border: 1px solid var(--rule);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-lg);
            font-size: 0.8rem;
            max-width: 280px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            line-height: 1.6;
        }
        .liunian-detail-popover.show { opacity: 1; pointer-events: auto; }

        @media (max-width: 768px) {
            .back-to-top { bottom: 1rem; right: 1rem; width: 2.5rem; height: 2.5rem; font-size: 1rem; }
            .lucky-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="toast-wrap"><div id="toast" class="toast"></div></div>
    <div class="liunian-detail-popover" id="liunianPopover"></div>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="historyDrawer">
        <div class="drawer-header">
            <span class="drawer-title">排盘历史</span>
            <button class="btn-icon btn-outline" id="closeDrawerBtn" aria-label="关闭历史面板" style="width:2rem;height:2rem;font-size:0.85rem;">✕</button>
        </div>
        <div id="historyList" style="margin-bottom:1rem;"></div>
        <button class="btn btn-outline btn-sm" id="clearHistoryBtn" style="width:100%;">清空历史</button>
    </div>

    <div class="modal-overlay" id="compareModalOverlay">
        <div class="modal" id="compareModal">
            <div class="modal-header">
                <span style="font-size:1.1rem;font-weight:700;">八字对比分析</span>
                <button class="btn-icon btn-outline" id="closeCompareBtn" aria-label="关闭对比窗口" style="width:2rem;height:2rem;font-size:0.85rem;">✕</button>
            </div>
            <div class="compare-grid" id="compareContent"></div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <h3 style="font-size:1rem;font-weight:700;color:var(--ink);">确认操作</h3>
            <p id="confirmMsg"></p>
            <div class="confirm-actions">
                <button class="btn btn-outline btn-sm" id="confirmCancelBtn">取消</button>
                <button class="btn btn-primary btn-sm" id="confirmOkBtn">确认</button>
            </div>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTopBtn" aria-label="回到顶部" title="回到顶部">↑</button>

    <div class="app-wrap" id="appWrap">
        <header class="header">
            <div class="header-row">
                <h1>AI八字排盘</h1>
                <button class="theme-btn" id="themeToggle" aria-label="切换主题" title="切换明暗主题">☀️</button>
            </div>
            <div class="sub">
                <span>AI 智能命理辅助工具</span>
                <span style="color:var(--rule);">|</span>
                <a href="#" id="historyBtn" style="cursor:pointer;">📋 历史记录</a>
                <a href="https://github.com/XiaochangXu/Bazi-prompt-generator" target="_blank" style="cursor:pointer;">GitHub</a>
            </div>
        </header>

        <div class="main-layout">
            <div class="layout-left">
                <!-- FORM CARD -->
                <div class="card" style="padding:1rem;">
                    <form id="baziForm" autocomplete="off">
                        <!-- Calendar Type Toggle -->

    <script>
    /* ================================================================

    const GAN_YINYANG = {'甲':'阳','丙':'阳','戊':'阳','庚':'阳','壬':'阳','乙':'阴','丁':'阴','己':'阴','辛':'阴','癸':'阴'};
    const YANG_GAN = ['甲','丙','戊','庚','壬'];

    const GAN_LU_DI = {'甲':'寅','乙':'卯','丙':'巳','丁':'午','戊':'巳','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子'};
    const GAN_DIWANG_DI = {'甲':'卯','乙':'寅','丙':'午','丁':'巳','戊':'午','己':'巳','庚':'酉','辛':'申','壬':'子','癸':'亥'};
    const ZHI_HIDE_MAP = {
        '子':['癸'],'丑':['己','癸','辛'],'寅':['甲','丙','戊'],'卯':['乙'],
        '辰':['戊','乙','癸'],'巳':['丙','庚','戊'],'午':['丁','己'],'未':['己','丁','乙'],
        '申':['庚','壬','戊'],'酉':['辛'],'戌':['戊','辛','丁'],'亥':['壬','甲']
    };

    // Phase 2: 穷通宝鉴完整调候表 (十干 × 十二月令，共120种组合)
    const QIONGTONG_TIAOHOU = {

        '己':{ 1:'丙庚甲', 2:'丙庚甲', 3:'丙甲癸', 4:'癸丙', 5:'癸丙', 6:'癸丙', 7:'丙癸', 8:'丙癸', 9:'甲丙癸', 10:'丙甲戊', 11:'丙甲戊', 12:'丙甲戊' },
        '庚':{ 1:'丙甲丁', 2:'丁甲庚丙', 3:'甲戊丁', 4:'壬戊丙', 5:'壬癸', 6:'壬丁', 7:'丁甲', 8:'丁甲', 9:'甲壬', 10:'丁丙', 11:'丁丙', 12:'丙丁甲' },
        '辛':{ 1:'己壬庚', 2:'壬甲', 3:'壬甲', 4:'壬甲', 5:'壬己癸', 6:'壬己庚', 7:'壬甲戊', 8:'壬甲', 9:'壬甲', 10:'壬丙', 11:'丙壬', 12:'丙戊壬' },
        '壬':{ 1:'庚丙戊', 2:'戊辛庚', 3:'戊庚甲', 4:'壬辛', 5:'癸庚辛', 6:'辛甲', 7:'戊丁辛', 8:'甲庚', 9:'甲丙', 10:'戊丙庚', 11:'戊丙庚', 12:'丙丁甲' },
        '癸':{ 1:'辛丙', 2:'丙庚辛', 3:'丙辛甲', 4:'庚辛', 5:'庚壬癸', 6:'庚辛癸', 7:'丁甲', 8:'辛丙', 9:'辛甲壬', 10:'庚辛戊丁', 11:'丙辛', 12:'丙丁' }
    };

    // Phase 1: 旺衰评分权重（古籍导向：月令权重 ≥ 50%，通根远大于天干）
    const YL_SHENGFU_WEIGHT = 65;     // 月令为生扶时的权重
    const YL_KEXIE_WEIGHT = 55;      // 月令为克泄耗时的权重（对标生扶）
    const BENQI_ROOT_WEIGHT = 25;     // 本气根（禄刃长生）= 2.5倍天干
    const YUQI_ROOT_WEIGHT = 12;      // 余气根 = 1.2倍天干
    const MUKU_ROOT_WEIGHT = 8;       // 墓库根 = 0.8倍天干
    const GAN_SIDE_WEIGHT = 10;       // 天干比劫印 = 标准单位
    const WANGDU_THRESHOLDS = { WEAK: 80, NEUTRAL: 130, STRONG: 200, EXTREME: 300 };

    // Phase 3: 月令地支编号 → 农历月份
    const ZHI_TO_MONTH = {'寅':1,'卯':2,'辰':3,'巳':4,'午':5,'未':6,'申':7,'酉':8,'戌':9,'亥':10,'子':11,'丑':12};

    // Phase 4: 扩展神煞表
    const LU_SHEN_MAP = {'甲':'寅','乙':'卯','丙':'巳','丁':'午','戊':'巳','己':'午','庚':'申','辛':'酉','壬':'亥','癸':'子'};
    const JIN_YU_MAP = {'甲':'辰','乙':'巳','丙':'未','丁':'申','戊':'未','己':'申','庚':'戌','辛':'亥','壬':'丑','癸':'寅'};
    const XUE_TANG_MAP = {'甲':'亥','乙':'午','丙':'寅','丁':'酉','戊':'寅','己':'酉','庚':'巳','辛':'子','壬':'申','癸':'卯'};
    const TAI_JI_MAP = {'甲':'子午','乙':'卯酉','丙':'寅申','丁':'巳亥'};
    const FU_XING_MAP = {'甲':'丑','乙':'寅','丙':'寅','丁':'亥','戊':'巳','己':'未','庚':'申','辛':'未','壬':'亥','癸':'丑'};
    const GU_CHEN_MAP = {'亥':'寅','子':'寅','丑':'寅','寅':'巳','卯':'巳','辰':'巳','巳':'申','午':'申','未':'申','申':'亥','酉':'亥','戌':'亥'};
    const GUA_SU_MAP = {'亥':'戌','子':'戌','丑':'戌','寅':'丑','卯':'丑','辰':'丑','巳':'辰','午':'辰','未':'辰','申':'未','酉':'未','戌':'未'};

    // Phase 4: 幸运信息推导
    const WX_COLORS = {'木':['绿色','青色','翠色'],'火':['红色','紫色','橙色'],'土':['黄色','棕色','咖啡色'],'金':['白色','金色','银色'],'水':['黑色','蓝色','灰色']};
    const WX_DIRECTIONS = {'木':'东方','火':'南方','土':'中央/西南','金':'西方','水':'北方'};
    const WX_NUMBERS = {'木':[1,2,3,8],'火':[2,3,7],'土':[5,0,2,7],'金':[4,9,6,7],'水':[1,6,9]};
    const WX_INDUSTRIES = {
        '木':['教育','文化','出版','医疗','园艺','木材','家具','纺织'],
        '火':['能源','电力','餐饮','娱乐','传媒','互联网','美容','化工'],
        '土':['房地产','建筑','矿产','农业','仓储','陶瓷','咨询','环保'],
        '金':['金融','银行','保险','机械','汽车','珠宝','法律','军警'],
        '水':['物流','航运','旅游','贸易','渔业','酒水','传媒','IT']
    };
    const WX_ORDER = ['木','火','土','金','水'];

    /* ================================================================
       MODULE: Utilities
       ================================================================ */
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    function sanitize(s) {
        return s.replace(/[<>&"'\/]/g, m => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#x27;','/':'&#x2F;'})[m]);
    }

    function isValidDate(y, m, d) {
        if (isNaN(y)||isNaN(m)||isNaN(d)) return false;
        const dt = new Date(y, m-1, d);
        return dt.getFullYear()===y && dt.getMonth()===m-1 && dt.getDate()===d;
    }

    let toastTimer;
    function showToast(msg, type='', duration=3000) {
        const t = $('#toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), duration);
    }

    function wrapWxColor(char) {
        if (!char) return '';
        const cls = WUXING_MAP[char];
        return cls ? `<span class="wx-${cls}">${char}</span>` : char;
    }

    function getEquationOfTime(y, m, d) {
        const N = Math.floor(275*m/9) - Math.floor((m+9)/12)*(1+Math.floor((y-4*Math.floor(y/4)+2)/3)) + d - 30;
        const B = (360/365.24)*(N-81)*Math.PI/180;
        return 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
    }

    function getShiShen(dayGan, targetGan) {
        if (!dayGan||!targetGan) return '';
        const wd = GAN_WUXING[dayGan], wt = GAN_WUXING[targetGan];
        const dy = GAN_YINYANG[dayGan]==='阳', ty = GAN_YINYANG[targetGan]==='阳';
        if (wd===wt) return dy===ty ? '比肩':'劫财';
        const relMap = {
            '木火':'我生','火土':'我生','土金':'我生','金水':'我生','水木':'我生',
            '木土':'我克','土水':'我克','水火':'我克','火金':'我克','金木':'我克',
            '木金':'克我','金火':'克我','火水':'克我','水土':'克我','土木':'克我',
            '木水':'生我','水金':'生我','金土':'生我','土火':'生我','火木':'生我'
        };
        const rel = relMap[wd+wt];
        switch(rel) {
            case '我生': return dy===ty?'食神':'伤官';
            case '我克': return dy===ty?'偏财':'正财';
            case '克我': return dy===ty?'七杀':'正官';
            case '生我': return dy===ty?'偏印':'正印';
            default: return '';
        }
    }

    function getChangSheng(dayGan, diZhi) {
        const startZhi = CHANG_SHENG_START[dayGan];
        if (!startZhi) return '';
        const si = DI_ZHI_ORDER.indexOf(startZhi), ti = DI_ZHI_ORDER.indexOf(diZhi);
        if (si===-1||ti===-1) return '';
        const isYang = GAN_YINYANG[dayGan]==='阳';
        return CHANG_SHENG_NAMES[(isYang?(ti-si+12):(si-ti+12))%12];
    }

    // Phase 2: 判断月令藏干是否透出天干
    function getYueLingTouGan(yueZhi, allGanArr) {
        const hideGan = ZHI_HIDE_MAP[yueZhi];
        const touGan = hideGan.filter(g => allGanArr.includes(g));
        return { hideGan, touGan, allTouGan: touGan, mainTouGan: touGan.length>0 ? touGan[0] : null };
    }

    // Phase 3: 判断天干是否在地支有强力通根
    function getRootLevel(gan, allZhi) {
        const luDi = GAN_LU_DI[gan];      // 临官/禄
        const wangDi = GAN_DIWANG_DI[gan]; // 帝旺/刃
        const changShengZhi = CHANG_SHENG_START[gan]; // 长生
        let level = 0;
        for (const zhi of allZhi) {
            if (zhi === luDi || zhi === wangDi || zhi === changShengZhi) level = 3; // 本气强根
            else if (ZHI_HIDE_MAP[zhi] && ZHI_HIDE_MAP[zhi].length > 0 && ZHI_HIDE_MAP[zhi][0] === gan) level = Math.max(level, 3); // 本气根
            else if (ZHI_HIDE_MAP[zhi] && ZHI_HIDE_MAP[zhi].length > 1 && ZHI_HIDE_MAP[zhi][1] === gan) level = Math.max(level, 2); // 余气根
            else if (ZHI_HIDE_MAP[zhi] && ZHI_HIDE_MAP[zhi].length > 2 && ZHI_HIDE_MAP[zhi][2] === gan) level = Math.max(level, 1); // 墓库根
        }
        return level; // 0=无根, 1=浅根(墓库), 2=中根(余气), 3=深根(本气/禄刃长生)
    }

    // Phase 3: 判断专旺五格
    function checkZhuanWangGe(wuxingMap, allGan, allZhi) {
        const wxNames = ['木','火','土','金','水'];
        const geNames = ['曲直格','炎上格','稼穑格','从革格','润下格'];
        const wxGans = [['甲','乙'],['丙','丁'],['戊','己'],['庚','辛'],['壬','癸']];
        const wxZhis = [['寅','卯'],['巳','午'],['辰','戌','丑','未'],['申','酉'],['亥','子']];
        const shengMap = {'木':'水','火':'木','土':'火','金':'土','水':'金'};

        for (let i=0; i<5; i++) {
            const ganOk = allGan.every(g => wxGans[i].includes(g) || (g===allGan[2])); // 允许日主
            const zhiOk = allZhi.every(z => wxZhis[i].includes(z));
            if (ganOk && zhiOk) return geNames[i];
        }
        return null;
    }

    /* ================================================================
       MODULE: Relations Calculator (刑冲合害)
       ================================================================ */
    const ZHI_RELATIONS = {
        he: [['子','丑'],['寅','亥'],['卯','戌'],['辰','酉'],['巳','申'],['午','未']],
        chong: [['子','午'],['丑','未'],['寅','申'],['卯','酉'],['辰','戌'],['巳','亥']],
        hai: [['子','未'],['丑','午'],['寅','巳'],['卯','辰'],['申','亥'],['酉','戌']],
        xing: [['寅','巳'],['巳','申'],['申','寅'],['丑','戌'],['戌','未'],['未','丑'],['子','卯'],['辰','辰'],['午','午'],['酉','酉'],['亥','亥']]
    };

    function calcRelations(zhiArr, zhiLabels) {
        const results = [];
        const zhiImpact = {}; // Phase 3: 冲合对各柱根基的影响
        zhiArr.forEach(z => { zhiImpact[z] = 1.0; }); // 默认无影响

        for (let i=0; i<zhiArr.length; i++) {
            for (let j=i+1; j<zhiArr.length; j++) {
                const pair = [zhiArr[i], zhiArr[j]].sort();
                ZHI_RELATIONS.he.forEach(r => {
                    const s = [...r].sort();
                    if (pair[0]===s[0]&&pair[1]===s[1]) results.push({a:zhiLabels[i],b:zhiLabels[j],type:'合',cls:'rel-he',label:'六合'});
                });
                ZHI_RELATIONS.chong.forEach(r => {
                    const s = [...r].sort();
                    if (pair[0]===s[0]&&pair[1]===s[1]) {
                        results.push({a:zhiLabels[i],b:zhiLabels[j],type:'冲',cls:'rel-chong',label:'六冲'});
                        // Phase 3: 六冲削弱双方藏干根基
                        zhiImpact[zhiArr[i]] = Math.min(zhiImpact[zhiArr[i]], 0.4);
                        zhiImpact[zhiArr[j]] = Math.min(zhiImpact[zhiArr[j]], 0.4);
                    }
                });
                ZHI_RELATIONS.hai.forEach(r => {
                    const s = [...r].sort();
                    if (pair[0]===s[0]&&pair[1]===s[1]) {
                        results.push({a:zhiLabels[i],b:zhiLabels[j],type:'害',cls:'rel-hai',label:'六害'});
                        zhiImpact[zhiArr[i]] = Math.min(zhiImpact[zhiArr[i]], 0.6);
                        zhiImpact[zhiArr[j]] = Math.min(zhiImpact[zhiArr[j]], 0.6);
                    }
                });
                ZHI_RELATIONS.xing.forEach(r => {
                    if ((zhiArr[i]===r[0]&&zhiArr[j]===r[1])||(zhiArr[i]===r[1]&&zhiArr[j]===r[0])) {
                        results.push({a:zhiLabels[i],b:zhiLabels[j],type:'刑',cls:'rel-xing',label:'相刑'});
                        zhiImpact[zhiArr[i]] = Math.min(zhiImpact[zhiArr[i]], 0.5);
                        zhiImpact[zhiArr[j]] = Math.min(zhiImpact[zhiArr[j]], 0.5);
                    }
                });
            }
        }
        return { results, zhiImpact };
    }

    /* ================================================================
       MODULE: Core Calculator (Phase 1+2+3 全面重写)
       ================================================================ */
    function buildPillar(ganZhi, gan, zhi, hideGanArr, dayGan, hasShiShen) {
        return {
            ganZhi, gan, zhi,
            hideGan: hideGanArr.map(h => ({gan:h, shiShen:getShiShen(dayGan,h)})),
            changSheng: getChangSheng(dayGan, zhi),
            shiShen: hasShiShen ? getShiShen(dayGan, gan) : ''
        };
    }

    function isLibReady() { return typeof Solar !== 'undefined' && typeof Lunar !== 'undefined'; }
    function isLibFailed() { return window.__LUNAR_FAIL__ === true; }

    function calculateBaziData(name, gender, year, month, day, hour, minute, longitude) {
        if (!isLibReady()) throw new Error('命理核心库未加载，请刷新页面后重试。');

        const lngOffset = (longitude - 120.0) * 4;
        const eot = getEquationOfTime(year, month, day);
        const totalOff = lngOffset + eot;
        let base = new Date(year, month-1, day, hour, minute);
        base.setMilliseconds(base.getMilliseconds() + totalOff*60*1000);

        const solar = Solar.fromYmdHms(base.getFullYear(), base.getMonth()+1, base.getDate(), base.getHours(), base.getMinutes(), 0);
        const lunar = solar.getLunar();
        const ec = lunar.getEightChar();
        const dayGan = ec.getDayGan();

        const bp = (gz, g, z, hg, hs) => buildPillar(gz, g, z, hg, dayGan, hs);
        const yearP  = bp(ec.getYear(),  ec.getYearGan(),  ec.getYearZhi(),  ec.getYearHideGan(),  true);
        const monthP = bp(ec.getMonth(), ec.getMonthGan(), ec.getMonthZhi(), ec.getMonthHideGan(), true);
        const dayP   = bp(ec.getDay(),   ec.getDayGan(),   ec.getDayZhi(),   ec.getDayHideGan(),   false);
        const timeP  = bp(ec.getTime(),  ec.getTimeGan(),  ec.getTimeZhi(),  ec.getTimeHideGan(),  true);

        // Dayun computation
        const yun = ec.getYun(gender==='男'?1:0);
        const exactYunText = `${yun.getStartYear()}岁${yun.getStartMonth()}个月${yun.getStartDay()}天起运`;
        const rawDaYun = yun.getDaYun();
        let realStartAge=8, realStartYear=year+8;

        // Phase 1: 移除假"胎运"概念，改为注记行
        const filteredDaYun = [];
        for (let i=0; i<rawDaYun.length; i++) {
            if (rawDaYun[i].getGanZhi()) { realStartYear=rawDaYun[i].getStartYear(); realStartAge=rawDaYun[i].getStartAge(); break; }
        }

        // 起运前注解（非古籍"胎运"，仅为说明性注记）
        const preYunNote = {
            isPreYun: true, ganZhi: ec.getMonth(),
            ageText:`0~${realStartAge}岁`, yearText:`${year}-${realStartYear}`,
            shiShen: getShiShen(dayGan, ec.getMonthGan()),
            note: `起运前以月柱${ec.getMonth()}为运根（${exactYunText})`,
            liuNian:[]
        };

        const nowYear = new Date().getFullYear();
        rawDaYun.forEach(dYun => {
            const gz = dYun.getGanZhi(); if (!gz) return;
            const sa = dYun.getStartAge(), ea = dYun.getEndAge(), sy = dYun.getStartYear();
            filteredDaYun.push({
                isPreYun:false, ganZhi:gz, gan:gz.charAt(0), zhi:gz.charAt(1),
                isCurrent: (nowYear>=sy && nowYear<sy+10),
                ageText:`${sa}-${ea}岁`, yearText:`${sy}-${sy+10}`,
                shiShen: getShiShen(dayGan, gz.charAt(0)),
                liuNian: dYun.getLiuNian().map(ln => ({
                    year:ln.getYear(), ganZhi:ln.getGanZhi(),
                    shiShen:getShiShen(dayGan, ln.getGanZhi().charAt(0))
                }))
            });
        });

        // Data extraction
        const dmWx = GAN_WUXING[dayGan];
        const dmIsYang = GAN_YINYANG[dayGan] === '阳';
        const yueLingZhi = ec.getMonthZhi();
        const allZhi = [ec.getYearZhi(), yueLingZhi, ec.getDayZhi(), ec.getTimeZhi()];
        const allGan = [ec.getYearGan(), ec.getMonthGan(), ec.getDayGan(), ec.getTimeGan()];
        const yueLingMonth = ZHI_TO_MONTH[yueLingZhi] || month;

        // ----- PHASE 1+2: 旺衰双维度评分体系 -----
        // 维度一：旺衰 (基于月令)
        const yueLingBenQiWx = GAN_WUXING[ZHI_HIDE_MAP[yueLingZhi][0]];
        const isDeLing = yueLingBenQiWx === dmWx || {'木':'水','火':'木','土':'火','金':'土','水':'金'}[dmWx] === yueLingBenQiWx;

        // Phase 3: 计算刑冲合害影响
        const zhiLabels = ['年', '月', '日', '时'];
        const { results: relations, zhiImpact } = calcRelations(allZhi, zhiLabels);

        // 维度二：强弱 (基于全局通根+比劫印)
        const isShengFuWx = (wx) => wx === dmWx || {'木':'水','火':'木','土':'火','金':'土','水':'金'}[dmWx] === wx;
        let monthlyBasis = 0; // 旺度 (月令维度, 0-100)
        let dayStrength = 0;  // 强度 (全局维度, 0-100)

        // 月令旺度
        if (isDeLing) {
            monthlyBasis = YL_SHENGFU_WEIGHT;
        } else {
            monthlyBasis = -YL_KEXIE_WEIGHT;
        }

        // 全局强度: 逐柱扫描
        const allGanWithDayExcept = (gi) => gi===2 ? null : allGan[gi];

        allZhi.forEach((zhi, zi) => {
            const impactFactor = zhiImpact[zhi] || 1.0; // Phase 3: 刑冲害影响系数
            ZHI_HIDE_MAP[zhi].forEach((g, gi) => {
                const wx = GAN_WUXING[g];
                const rawWeight = gi===0 ? BENQI_ROOT_WEIGHT : (gi===1 ? YUQI_ROOT_WEIGHT : MUKU_ROOT_WEIGHT);
                const adjWeight = rawWeight * impactFactor;
                if (isShengFuWx(wx)) dayStrength += adjWeight;
            });
        });

        allGan.forEach((g, gi) => {
            if (gi===2) return; // 日主自身不计数
            if (isShengFuWx(GAN_WUXING[g])) dayStrength += GAN_SIDE_WEIGHT;
        });

        // 合并双维评分
        const totalWang = 100 + monthlyBasis + dayStrength;
        const dmRootLevel = getRootLevel(dayGan, allZhi);
        const hasAnyRoot = dmRootLevel > 0;
        const hasStrongRoot = dmRootLevel >= 3;

        // 旺衰判定
        let wl = '中和', isCong = false, isZhuanWang = false;
        let wangStatus = ''; // 旺衰维度描述
        let qiangStatus = ''; // 强弱维度描述

        // 旺衰维度描述
        if (isDeLing) wangStatus = '得令'; else wangStatus = '失令';

        // 强弱维度描述
        if (hasStrongRoot && dayStrength > 60) qiangStatus = '强（通根深+党众）';
        else if (hasAnyRoot && dayStrength > 30) qiangStatus = '有根';
        else if (!hasAnyRoot) qiangStatus = '无根漂浮';
        else qiangStatus = '根浅';

        // Phase 1: 从格基于通根判断（有根即不从）
        if (!hasAnyRoot && dayStrength < 10 && !isDeLing && totalWang < 40) {
            wl = '从弱格'; isCong = true;
        } else if (isDeLing && dayStrength > 120 && totalWang > WANGDU_THRESHOLDS.EXTREME) {
            // Phase 3: 先检查专旺五格
            const zhuanWangGe = checkZhuanWangGe({}, allGan, allZhi);
            if (zhuanWangGe) {
                wl = '专旺格'; isCong = true; isZhuanWang = true; wangStatus = zhuanWangGe;
            } else {
                wl = '从强格'; isCong = true;
            }
        } else if (totalWang < 50) {
            wl = '身弱';
        } else if (totalWang <= WANGDU_THRESHOLDS.NEUTRAL) {
            wl = '中和';
        } else if (totalWang <= WANGDU_THRESHOLDS.STRONG) {
            wl = '身强';
        } else if (totalWang <= WANGDU_THRESHOLDS.EXTREME) {
            // Phase 3: 极强先查专旺
            const zhuanWangGe = checkZhuanWangGe({}, allGan, allZhi);
            if (zhuanWangGe) { wl = '专旺格'; isZhuanWang = true; wangStatus = zhuanWangGe; }
            else wl = '身极强';
        } else {
            const zhuanWangGe = checkZhuanWangGe({}, allGan, allZhi);
            if (zhuanWangGe) { wl = '专旺格'; isZhuanWang = true; wangStatus = zhuanWangGe; }
            else wl = '身极强(不从)';
        }

        // ----- PHASE 2: 格局判定（透干检查 + 古籍标准） -----
        const ylTouGan = getYueLingTouGan(yueLingZhi, allGan);
        const yueLingMainGan = ylTouGan.mainTouGan || (ZHI_HIDE_MAP[yueLingZhi]?.[0]);
        const yueSs = getShiShen(dayGan, yueLingMainGan);
        const riCsInYue = getChangSheng(dayGan, yueLingZhi);

        // Phase 2: 格局定名（优先透干→月令主气）
        let geju = '';
        let gejuSource = ''; // 格局来源说明

        if (isZhuanWang) {
            geju = wangStatus || '专旺格';
            gejuSource = '专旺外格（曲直/炎上/稼穑/从革/润下）';
        } else if (riCsInYue === '帝旺' && dmIsYang) {
            // Phase 1 fix: 仅阳干在月令帝旺为羊刃格
            geju = '羊刃格';
            gejuSource = '日主阳干帝旺于月令';
        } else if (riCsInYue === '临官') {
            // 临官：日干同月令本气为建禄，不同为月劫
            if (yueLingMainGan === dayGan || GAN_WUXING[yueLingMainGan] === dmWx) {
                geju = '建禄格';
            } else {
                geju = '月劫格';
            }
            gejuSource = '日主临官于月令';
        } else if (isCong) {
            geju = wl;
            gejuSource = '从格变格';
        } else {
            // Phase 2: 透干取格
            if (ylTouGan.mainTouGan) {
                const touSs = getShiShen(dayGan, ylTouGan.mainTouGan);
                geju = touSs + '格';
                gejuSource = `月令透干${ylTouGan.mainTouGan}[${touSs}]取格`;
            } else {
                geju = yueSs + '格';
                gejuSource = `月令主气${yueLingMainGan}[${yueSs}]取格`;
            }
        }

        // ----- PHASE 3: 格局成败分析 -----
        const shengMap = {'木':'水','火':'木','土':'火','金':'土','水':'金'};
        const keMap = {'木':'金','火':'水','土':'木','金':'火','水':'土'};
        const xieMap = {'木':'火','火':'土','土':'金','金':'水','水':'木'};
        const haoMap = {'木':'土','火':'金','土':'水','金':'木','水':'火'};
        const biWx = dmWx, yinWx = shengMap[dmWx];
        const rcw = (wx) => `<span class="wx-${WUXING_MAP[wx]}">${wx}</span>`;

        const allGanStr = allGan.join('');
        const allZhiStr = allZhi.join('');
        let gejuQuality = ''; // 格局评价文字
        let gejuIssues = [];  // 败格信号
        let gejuStrengths = []; // 成格信号

        const gejuOnly = geju.replace('格','').replace('羊刃','').replace('建禄','').replace('月劫','');

        // 八字命理八大格局基础成败检查
        if (geju.includes('正官')) {
            if (allGanStr.includes(dayGan)) {
                const shangGuanGan = allGan.filter(g => getShiShen(dayGan, g) === '伤官').join('');
                if (shangGuanGan) gejuIssues.push(`天干透伤官${shangGuanGan} → 伤官见官为败格` );
            }
            const yinGan = allGan.filter(g => getShiShen(dayGan, g) === '正印' || getShiShen(dayGan, g) === '偏印').join('');
            const caiGan = allGan.filter(g => getShiShen(dayGan, g) === '正财' || getShiShen(dayGan, g) === '偏财').join('');
            if (yinGan) gejuStrengths.push(`透印${yinGan}护官，成格` );
            if (caiGan) gejuStrengths.push(`透财${caiGan}生官，成格` );
        }
        if (geju.includes('七杀') || geju.includes('杀')) {
            const shiGan = allGan.filter(g => getShiShen(dayGan, g) === '食神').join('');
            if (shiGan) gejuStrengths.push(`透食神${shiGan} → 食神制杀为成格` );
            else gejuIssues.push('七杀无制 → 需身强或大运逢食制' );
        }
        if (geju.includes('印') || geju.includes('偏印')) {
            const caiGanB = allGan.filter(g => getShiShen(dayGan, g) === '正财' || getShiShen(dayGan, g) === '偏财').join('');
            if (caiGanB && !geju.includes('从')) gejuIssues.push(`透财${caiGanB} → 财坏印为败格` );
        }
        if (geju.includes('财')) {
            const jieGan = allGan.filter(g => getShiShen(dayGan, g) === '劫财').join('');
            if (jieGan) gejuIssues.push(`透劫财${jieGan} → 比劫夺财为败格` );
            if (wl==='身弱' || wl==='身极弱') gejuIssues.push('身弱财旺 → 不能任财' );
            if (wl==='身强') gejuStrengths.push('身强能任财 → 成格基础' );
            const qiShaGan = allGan.filter(g => getShiShen(dayGan, g) === '七杀').join('');
            if (qiShaGan) gejuIssues.push(`透七杀${qiShaGan} → 财党杀为败格` );
        }
        if (geju.includes('食神') || (geju.includes('食') && !geju.includes('食神'))) {
            const xiaoGan = allGan.filter(g => getShiShen(dayGan, g) === '偏印').join('');
            if (xiaoGan) gejuIssues.push(`透偏印${xiaoGan} → 枭神夺食为败格` );
        }
        if (geju.includes('伤官')) {
            if (wl==='身强' || wl==='身极强') gejuStrengths.push('身强伤官——可用"伤官伤尽"为贵' );
            else gejuIssues.push('伤官泄身过重 → 需印绶制伤生身' );
            const yinGanB = allGan.filter(g => getShiShen(dayGan, g) === '正印' || getShiShen(dayGan, g) === '偏印').join('');
            if (yinGanB) gejuStrengths.push(`透印${yinGanB} → 伤官佩印为贵格` );
        }
        if (geju.includes('羊刃')) {
            const guanShaGan = allGan.filter(g => ['正官','七杀'].includes(getShiShen(dayGan, g))).join('');
            if (guanShaGan) gejuStrengths.push(`透官杀${guanShaGan} → 官杀制刃为成格` );
            else gejuIssues.push('羊刃无官杀制 → 狂刃为败格' );
        }

        if (gejuIssues.length === 0 && gejuStrengths.length > 0) gejuQuality = '格局有成，较为清纯';
        else if (gejuIssues.length > 0 && gejuStrengths.length > 0) gejuQuality = '格局败中有成，需细察救应';
        else if (gejuIssues.length > 0) gejuQuality = '格局有败，逢救应大运方吉';
        else gejuQuality = '格局基本成立';

        // ----- PHASE 3: 格局驱动喜用忌神推导 -----
        const sfStr = `${rcw(yinWx)}(印) / ${rcw(biWx)}(比)`;
        const kxhStr = `${rcw(keMap[dmWx])}(杀) / ${rcw(haoMap[dmWx])}(财) / ${rcw(xieMap[dmWx])}(伤)`;

        let xiYong = '', jiShen = '';
        const gejuNameOnly = geju.replace('格','').replace('（变格）','');

        // 格局类型驱动喜忌（子平真诠核心）
        const goodGods = ['正官','正财','正印','食神'];
        const badGods = ['七杀','偏印','伤官','劫财','羊刃'];

        if (isZhuanWang) {
            xiYong = `顺势${sfStr}（专旺不可逆势）`;
            jiShen = `逆势 ${kxhStr}（破格大忌）`;
        } else if (isCong) {
            xiYong = '顺势用所从五行（克泄耗）';
            jiShen = `逆势生扶 ${sfStr}`;
        } else if (goodGods.some(g => gejuNameOnly.includes(g))) {
            // 善神格局：顺用（生护为主）
            if (wl === '身强' || wl === '身极强') {
                xiYong = `格局顺用：${kxhStr}（善神格局，身强可任）`;
                jiShen = sfStr;
            } else if (wl === '身弱') {
                xiYong = `格局顺用：${sfStr}（身弱先扶身，方可任善神）`;
                jiShen = kxhStr;
            } else {
                xiYong = `格局导向喜${kxhStr}，身需${sfStr}`;
                jiShen = '偏枯五行';
            }
        } else if (badGods.some(g => gejuNameOnly.includes(g))) {
            // 凶神格局：逆用（制化为要）
            if (wl === '身强' || wl === '身极强') {
                xiYong = `格局逆用：${kxhStr}（凶神需制化，身强更需克泄耗）`;
                jiShen = sfStr;
            } else {
                xiYong = `格局逆用：身需${sfStr}，凶神需制（${kxhStr}）`;
                jiShen = '偏枯五行';
            }
        } else {
            // 建禄/月劫/羊刃等特殊格局
            if (wl === '身强' || wl === '身极强') {
                xiYong = `${kxhStr}`;
                jiShen = sfStr;
            } else if (wl === '身弱') {
                xiYong = sfStr;
                jiShen = kxhStr;
            } else {
                xiYong = '需结合大运流年';
                jiShen = '偏枯五行';
            }
        }

        // ----- PHASE 2: 穷通宝鉴调候（完整10×12矩阵） -----
        const tiaoHouKey = QIONGTONG_TIAOHOU[dayGan]?.[yueLingMonth];
        let tiaoHou = '';
        if (tiaoHouKey) {
            const explainMap = {
                '丙':'🌞需丙火暖局','丁':'🕯️需丁火调候','甲':'🌳需甲木疏土/引火','乙':'🌿需乙木生火/疏土',
                '戊':'🏔️需戊土制水/制局','己':'⛰️需己土培根','庚':'⚔️需庚金劈甲/发源','辛':'💎需辛金生水/润局',
                '壬':'🌊需壬水济火/淘洗','癸':'💧需癸水滋润/解暑'
            };
            const missingGans = tiaoHouKey.split('').filter(g => !allGanStr.includes(g));
            const presentGans = tiaoHouKey.split('').filter(g => allGanStr.includes(g));
            let thDesc = tiaoHouKey.split('').map(g => explainMap[g] || `${g}`).join('，');
            if (missingGans.length === 0) {
                tiaoHou = `✅ 调候满足（古籍需${tiaoHouKey}）`;
            } else if (presentGans.length > 0) {
                tiaoHou = `⚠️ 调候不全：${thDesc} | 已有${presentGans.join('')}，缺失${missingGans.join('')}`;
            } else {
                tiaoHou = `❌ 调候大缺：${thDesc} | 全缺${missingGans.join('')}`;
            }
        } else {
            tiaoHou = '调候：时令中和，无特殊寒暖燥湿需求';
        }

        // Five elements strength (保持原算法+Phase 3刑冲合害影响)
        const wuxingPts = {'木':0,'火':0,'土':0,'金':0,'水':0};
        const oldYueLingWeight = 40;
        wuxingPts[GAN_WUXING[ZHI_HIDE_MAP[yueLingZhi][0]]] += oldYueLingWeight;

        allZhi.forEach((zhi, idx) => {
            const imp = zhiImpact[zhi] || 1.0;
            ZHI_HIDE_MAP[zhi].forEach((g, gi) => {
                if (idx===1&&gi===0) return;
                const rw = gi===0 ? 15 : (gi===1 ? 10 : 5);
                wuxingPts[GAN_WUXING[g]] += Math.round(rw * imp);
            });
        });
        allGan.forEach(g => { wuxingPts[GAN_WUXING[g]] += 5; });

        let totalWx=0; for (let k in wuxingPts) totalWx+=wuxingPts[k];
        const wxPercent = {};
        for (let k in wuxingPts) wxPercent[k] = totalWx===0?0:Math.round((wuxingPts[k]/totalWx)*100);

        // ShiShen count
        const ssCount = {};
        const allGanHide = [...allGan];
        allZhi.forEach(z => ZHI_HIDE_MAP[z].forEach(g => allGanHide.push(g)));
        allGanHide.forEach(g => {
            const ss = getShiShen(dayGan, g);
            if (ss) ssCount[ss] = (ssCount[ss]||0)+1;
        });
        const dmSs = getShiShen(dayGan, dayGan);
        if (ssCount[dmSs]>0) ssCount[dmSs]--;

        // Nayin & Xunkong
        const naYin = [ec.getYearNaYin(), ec.getMonthNaYin(), ec.getDayNaYin(), ec.getTimeNaYin()];
        const kwYear = ec.getYearXunKong(), kwDay = ec.getDayXunKong();

        // Structure
        const taiYuan = ec.getTaiYuan(), mingGong = ec.getMingGong(), shenGong = ec.getShenGong();

        // ShenSha
        const tianYiMap = {'甲':['丑','未'],'乙':['子','申'],'丙':['亥','酉'],'丁':['亥','酉'],'戊':['丑','未'],'己':['子','申'],'庚':['丑','未'],'辛':['午','寅'],'壬':['卯','巳'],'癸':['卯','巳']};
        const wenChangMap = {'甲':['巳'],'乙':['午'],'丙':['申'],'丁':['酉'],'戊':['申'],'己':['酉'],'庚':['亥'],'辛':['子'],'壬':['寅'],'癸':['卯']};
        const sanHeMap = {
            '申':['酉','寅','辰','子'],'子':['酉','寅','辰','子'],'辰':['酉','寅','辰','子'],
            '亥':['子','巳','未','卯'],'卯':['子','巳','未','卯'],'未':['子','巳','未','卯'],
            '寅':['卯','申','戌','午'],'午':['卯','申','戌','午'],'戌':['卯','申','戌','午'],
            '巳':['午','亥','丑','酉'],'酉':['午','亥','丑','酉'],'丑':['午','亥','丑','酉']
        };
        const riZhi = ec.getDayZhi(), shenSha=[];
        tianYiMap[dayGan].forEach(z => { if(allZhi.includes(z)) shenSha.push(`天乙贵人(${z})`); });
        wenChangMap[dayGan].forEach(z => { if(allZhi.includes(z)) shenSha.push(`文昌贵人(${z})`); });
        const addBranchSha = (bz) => {
            const arr = sanHeMap[bz];
            if (arr) {
                if (allZhi.includes(arr[0])) shenSha.push(`桃花(${arr[0]})`);
                if (allZhi.includes(arr[1])) shenSha.push(`驿马(${arr[1]})`);
                if (allZhi.includes(arr[2])) shenSha.push(`华盖(${arr[2]})`);
                if (allZhi.includes(arr[3])) shenSha.push(`将星(${arr[3]})`);
            }
        };
        addBranchSha(riZhi); addBranchSha(ec.getYearZhi());
        // Phase 4: 扩展神煞
        const riGan = dayGan, riZ = ec.getDayZhi(), yearZ = ec.getYearZhi();
        const checkZhi = (z) => allZhi.includes(z);
        if (LU_SHEN_MAP[riGan] && checkZhi(LU_SHEN_MAP[riGan])) shenSha.push(`禄神(${LU_SHEN_MAP[riGan]})`);
        if (JIN_YU_MAP[riGan] && checkZhi(JIN_YU_MAP[riGan])) shenSha.push(`金舆(${JIN_YU_MAP[riGan]})`);
        if (XUE_TANG_MAP[riGan] && checkZhi(XUE_TANG_MAP[riGan])) shenSha.push(`学堂(${XUE_TANG_MAP[riGan]})`);
        if (TAI_JI_MAP[riGan]) { const tz = TAI_JI_MAP[riGan]; if (checkZhi(tz[0])||checkZhi(tz[1])) shenSha.push(`太极贵人(${checkZhi(tz[0])?tz[0]:tz[1]})`); }
        if (FU_XING_MAP[riGan] && checkZhi(FU_XING_MAP[riGan])) shenSha.push(`福星贵人(${FU_XING_MAP[riGan]})`);
        if (GU_CHEN_MAP[riZ] && checkZhi(GU_CHEN_MAP[riZ])) shenSha.push(`孤辰(${GU_CHEN_MAP[riZ]})`);
        if (GUA_SU_MAP[riZ] && checkZhi(GUA_SU_MAP[riZ])) shenSha.push(`寡宿(${GUA_SU_MAP[riZ]})`);
        const uniqueShenSha = [...new Set(shenSha)];

        // Phase 4: 幸运信息推导
        const xiWxList = [];
        const xiStr = xiYong;
        WX_ORDER.forEach(wx => { if (xiStr.includes(wx)) xiWxList.push(wx); });
        const primaryXiWx = xiWxList.length > 0 ? xiWxList[0] : dmWx;
        const luckyInfo = {
            colors: WX_COLORS[primaryXiWx] || ['白色'],
            direction: WX_DIRECTIONS[primaryXiWx] || '东方',
            numbers: (WX_NUMBERS[primaryXiWx] || [1,6]).slice(0,3).join('、'),
            industries: (WX_INDUSTRIES[primaryXiWx] || ['综合']).join('、'),
            primaryWx: primaryXiWx
        };

        return {
            name, gender,
            birthday: `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}-${String(base.getDate()).padStart(2,'0')} ${String(base.getHours()).padStart(2,'0')}:${String(base.getMinutes()).padStart(2,'0')}`,
            exactYunText,
            preYunNote,
            pillars: [yearP, monthP, dayP, timeP],
            dayPillar: dayP,
            daYun: filteredDaYun,
            stats: { wuxingPts, wxPercent, ssCount, naYin, kwYear, kwDay },
            structure: { taiYuan, mingGong, shenGong, shenSha: uniqueShenSha },
            analysis: {
                wangDu: totalWang,
                wangDuLevel: wl,
                wangStatus, qiangStatus,
                dmRootLevel,
                isDeLing,
                geJu: geju,
                gejuSource,
                gejuQuality,
                gejuStrengths,
                gejuIssues,
                xiYong, jiShen,
                tiaoHou,
                dmWx: dmWx
            },
            luckyInfo,
            relations,
            raw: { ec, solar, lunar, year, month, day, hour, minute, longitude }
        };
    }

                const URLS = [self.location.href];
                self.addEventListener('install', e => { self.skipWaiting(); });
                self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                            if (res.ok) { const clone = res.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); }
                            return res;
                        }).catch(() => caches.match(e.request)))
                    );
                });
            `;
            const blob = new Blob([swCode], {type:'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
        });

    function decodeParams() {
        const h = window.location.hash.slice(1);
        if (!h) return null;
        const sp = new URLSearchParams(h);
        return {
            year: parseInt(sp.get('y')), month: parseInt(sp.get('m')), day: parseInt(sp.get('d')),
            hour: parseInt(sp.get('h')), minute: parseInt(sp.get('mi')),
            longitude: parseFloat(sp.get('lng')), gender: sp.get('g'), name: sp.get('n')
        };
    }

            parent.querySelector('.err-msg').textContent = msg;
            return false;
        } else {
            field.classList.remove('error');
            parent.querySelector('.err-msg').textContent = '';

    $('#aiAnalyzeBtn').addEventListener('click', async () => {
        if (!currentData) return;
        const provider = $('#aiProvider').value;
        const key = $('#aiKey').value.trim();
        if (!key) { showToast('请输入API密钥','error'); return; }

        // Save key/config
        saveAiConfig(provider, {
            key: key,
            siteName: $('#aiSiteName').value.trim(),
            siteUrl: $('#aiSiteUrl').value.trim(),
            model: $('#aiModel').value.trim()
        });

        const prompt = buildAiPrompt(currentData);
        $('#aiResponse').style.display = 'block';
        $('#aiResponse').textContent = '';
        $('#aiResponse').classList.add('streaming');
        $('#aiLoading').style.display = 'flex';
        $('#aiAnalyzeBtn').style.display = 'none';
        $('#aiStopBtn').style.display = '';

        let endpoint, model, headers, body;

        // Helper: auto-build endpoint from site URL for custom API
        function buildCustomEndpoint(url) {
            if (!url) return 'https://api.openai.com/v1/chat/completions';
            // Strip trailing slash
            let u = url.replace(/\/+$/, '');
            // If already contains /v1/chat/completions, use as-is
            if (u.includes('/v1/chat/completions')) return u;
            // If already contains /chat/completions, use as-is
            if (u.includes('/chat/completions')) return u;
            // If contains /v1/ but not completions, append /chat/completions
            if (u.includes('/v1/') && !u.includes('/chat/completions')) return u + '/chat/completions';
            // Otherwise, auto-append /v1/chat/completions
            return u + '/v1/chat/completions';
        }

        switch (provider) {
            case 'openai':
                endpoint = 'https://api.openai.com/v1/chat/completions';
                model = 'gpt-4o-mini';
                headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key };
                body = JSON.stringify({ model, messages: [{role:'user',content:prompt}], max_tokens: 3000, temperature: 0.7, stream: true });
                break;
            case 'deepseek':
                endpoint = 'https://api.deepseek.com/chat/completions';
                model = 'deepseek-chat';
                headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key };
                body = JSON.stringify({ model, messages: [{role:'user',content:prompt}], max_tokens: 3000, temperature: 0.7, stream: true });
                break;
            case 'anthropic':
                endpoint = 'https://api.anthropic.com/v1/messages';
                model = 'claude-3-haiku-20240307';
                headers = { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' };
                body = JSON.stringify({ model, max_tokens: 3000, messages: [{role:'user',content:prompt}], stream: true });
                break;
            case 'gemini':
                endpoint = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?key=' + key;
                model = 'gemini-2.0-flash';
                headers = { 'Content-Type': 'application/json' };
                body = JSON.stringify({ contents: [{parts:[{text:prompt}]}] });
                break;
            case 'custom':
            default: {
                const siteUrl = $('#aiSiteUrl').value.trim();
                endpoint = buildCustomEndpoint(siteUrl);
                model = $('#aiModel').value.trim() || 'gpt-4o-mini';
                headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key };
                body = JSON.stringify({ model, messages: [{role:'user',content:prompt}], max_tokens: 3000, temperature: 0.7, stream: true });
                break;
            }
        }

        aiAbortController = new AbortController();

        try {
            const resp = await fetch(endpoint, {
                method: 'POST',
                headers,
                body,
                signal: aiAbortController.signal
            });
            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`API错误 ${resp.status}: ${errText.slice(0,200)}`);
            }

            $('#aiLoading').style.display = 'none';

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                // Process SSE lines
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || !trimmed.startsWith('data:')) continue;
                    const data = trimmed.slice(5).trim();
                    if (data === '[DONE]') continue;

                    try {
                        const json = JSON.parse(data);
                        let text = '';
                        if (provider === 'anthropic') {
                            if (json.type === 'content_block_delta' && json.delta?.text) text = json.delta.text;
                        } else if (provider === 'gemini') {
                            if (json.candidates?.[0]?.content?.parts?.[0]?.text) text = json.candidates[0].content.parts[0].text;
                        } else {
                            if (json.choices?.[0]?.delta?.content) text = json.choices[0].delta.content;
                        }
                        if (text) $('#aiResponse').textContent += text;
                    } catch(e) { /* skip malformed JSON */ }
                }
            }
        } catch(err) {
            if (err.name === 'AbortError') {
                $('#aiResponse').textContent += '\n\n[已停止]';
            } else {
                $('#aiLoading').style.display = 'none';
                $('#aiResponse').textContent = '请求失败: ' + err.message;
            }
        } finally {
            $('#aiResponse').classList.remove('streaming');
            $('#aiAnalyzeBtn').style.display = '';
            $('#aiStopBtn').style.display = 'none';
            aiAbortController = null;
        }
    });

    $('#aiStopBtn').addEventListener('click', () => {
        if (aiAbortController) { aiAbortController.abort(); }
    });

    // History drawer
    $('#historyBtn').addEventListener('click', e => { e.preventDefault(); openDrawer(); });
    $('#closeDrawerBtn').addEventListener('click', closeDrawer);
    $('#drawerOverlay').addEventListener('click', closeDrawer);

    // Clear history with confirm
    let confirmCallback = null;
    function showConfirm(msg, cb) {
        $('#confirmMsg').textContent = msg;
        confirmCallback = cb;
        $('#confirmOverlay').classList.add('open');
    }
    $('#confirmCancelBtn').addEventListener('click', () => {
        $('#confirmOverlay').classList.remove('open');
        confirmCallback = null;
    });
    $('#confirmOkBtn').addEventListener('click', () => {
        $('#confirmOverlay').classList.remove('open');
        if (confirmCallback) { confirmCallback(); confirmCallback = null; }
    });
    $('#confirmOverlay').addEventListener('click', function(e) {
        if (e.target === this) { this.classList.remove('open'); confirmCallback = null; }
    });

    $('#clearHistoryBtn').addEventListener('click', () => {
        showConfirm('确定要清空所有排盘历史记录吗？此操作不可恢复。', () => {
            localStorage.removeItem(STORAGE_KEY);
            renderHistoryList();
            showToast('历史已清空');
        });
    });

    // Compare modal
    $('#closeCompareBtn').addEventListener('click', () => $('#compareModalOverlay').classList.remove('open'));
    $('#compareModalOverlay').addEventListener('click', function(e) { if (e.target===this) this.classList.remove('open'); });

    // Accordion: event delegation (replaces inline onclick)
    document.getElementById('dayunContainer').addEventListener('click', function(e) {
        const header = e.target.closest('.dayun-header');
        if (!header) return;
        const item = header.parentElement;
        const wasActive = item.classList.contains('active');
        this.querySelectorAll('.dayun-item').forEach(el => { if (el !== item) el.classList.remove('active'); });
        if (wasActive) item.classList.remove('active');
        else item.classList.add('active');
    });

    // Liunian detail popover
    document.getElementById('dayunContainer').addEventListener('mouseover', function(e) {
        const tag = e.target.closest('.liunian-tag');
        if (!tag) { $('#liunianPopover').classList.remove('show'); return; }
        const popover = $('#liunianPopover');
        const year = tag.querySelector('span')?.textContent || '';
        const gz = tag.querySelectorAll('span')[1]?.textContent || '';
        const ss = tag.querySelector('.ss-text')?.textContent || '';
        popover.innerHTML = `<strong>${year}年</strong> · ${gz}<br>十神：${ss}<br><span style="font-size:0.7rem;color:var(--muted);">点击查看详细分析</span>`;
        popover.classList.add('show');
        const rect = tag.getBoundingClientRect();
        popover.style.left = Math.min(rect.left, window.innerWidth - 290) + 'px';
        popover.style.top = (rect.bottom + 6) + 'px';
    });
    document.getElementById('dayunContainer').addEventListener('mouseleave', function(e) {
        if (!e.target.closest('.liunian-tag')) $('#liunianPopover').classList.remove('show');
    });
    $('#liunianPopover').addEventListener('mouseleave', function() { this.classList.remove('show'); });

    // Keyboard support
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeDrawer();
            $('#compareModalOverlay').classList.remove('open');
            $('#confirmOverlay').classList.remove('open');
            $('#liunianPopover').classList.remove('show');
        }
    });

    // Back to Top
    const backToTopBtn = $('#backToTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 400) backToTopBtn.classList.add('visible');
        else backToTopBtn.classList.remove('visible');
    }, { passive: true });
    backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Privacy toggle
    let privacyMode = localStorage.getItem('bazi_privacy') === 'true';
    const privacyToggle = $('#privacyToggle');
    if (privacyMode) privacyToggle.classList.add('active');
    privacyToggle.addEventListener('click', () => {
        privacyMode = !privacyMode;
        privacyToggle.classList.toggle('active', privacyMode);
        localStorage.setItem('bazi_privacy', privacyMode);
        showToast(privacyMode ? '🔒 隐私模式已开启，排盘不保存到本地' : '📝 隐私模式已关闭，排盘将保存历史', '', 2000);
    });

    // Update saveToHistory to respect privacy mode
    const originalSaveToHistory = saveToHistory;
    saveToHistory = function(data) {
        if (privacyMode) return;
        originalSaveToHistory(data);
    };

    // Auto-load from URL hash
    (function() {
        const params = decodeParams();
        if (!params || !params.year) return;
        const checkReady = setInterval(() => {
            if (isLibReady()) {
                clearInterval(checkReady);
                $('#nameInput').value = params.name || '';
                $('#genderSelect').value = params.gender || '男';
                $('#yearInput').value = params.year;
                $('#monthInput').value = params.month;
                $('#dayInput').value = params.day;
                $('#timeInput').value = `${String(params.hour).padStart(2,'0')}:${String(params.minute||0).padStart(2,'0')}`;
                $('#lngInput').value = params.longitude || '120.00';
                $('#baziForm').dispatchEvent(new Event('submit'));
            }
            if (isLibFailed()) { clearInterval(checkReady); }
        }, 300);
        setTimeout(() => clearInterval(checkReady), 15000);
    })();
    </script>
</body>
</html>
